<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Team Innov8">
    <meta name="description" content="Contact us page">
    <link rel="icon" href="icons/digital_bookshelf.jpeg">
    <title>Contact Us</title>

    <style>
        html {
            background-image: url('images/bg3.jpg');
            background-size: cover;
        }
        input {
            border-radius: 5px;
            width: 15%;
            height: 10%;
            background-color: rgb(212, 215, 200);
        }
        button:hover{
            color: rgb(47, 105, 240);
            background-color: rgb(255, 170, 43);
            border-radius: 5px;
        }

        .form-field, p, address, legend, a{
            font-size: 19px;
        }

    </style>
</head>

<body>
    <header>
        <h1>Contact Us</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="catalog.html">Our Book Catalog</a></li>
                <li><a href="index.html#view-review">Show Reviews</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="contact-form-container">
            <h2>Contact Form</h2>
            <fieldset style="border-radius: 10px;">
                <legend>Send Us a Message</legend>
                <div class="form-field">
                    <form action="https://httpbin.org/post" method="post">
                        <label for="name">Name:</label>
                        <input type="text" id="name" name="name" width="13px" height="10px" placeholder="Your name" required>
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" placeholder="Your email" required>
                        <label for="message">Your Message:</label>
                        <textarea name="message" id="message" cols="30" rows="10"
                            placeholder="Type your message here" style="background-color: bisque; border-radius:5px;"></textarea>
                        <button type="submit">Send</button>
                        <button type="reset">Reset</button>
                    </form>
                </div>
            </fieldset>
        </div>
        <article id="location">
            <h2>Our Location</h2>
            <address>
                AASTU <br>
                Addis Ababa, Ethiopia <br><br>
                Phone: <a type="tel/+5555555555" href="tel:555-555-5555" style="color: rgb(255, 148, 17);">+251-921212121</a> <br><br>
            </address>
            <a href="#">Back to Top</a>
        </article>
    </main>
    <hr>
    <footer>
        <p>
            Copyright &copy; Team Innov8
        </p>
    </footer>
</body>

</html>
