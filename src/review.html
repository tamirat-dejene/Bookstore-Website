<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Team Innov8">
    <meta name="description" content="Submit Review page">
    <link rel="icon" href="icons/digital_bookshelf.jpeg">
    <title>Submit Review</title>

    <style>
        html {
            background-image: url('images/bg3.jpg');
            background-size: cover;
            font-size: 17px;
        }
        input, textarea, button{
            box-sizing: content-box;
            background-color: bisque;
        }
        button:hover{
            color: rgb(235, 142, 2);
            background-color: rgb(189, 229, 181);
        }
        fieldset, textarea, input{
            border-radius: 10px;
        }
        a{
            color: rgb(167, 165, 129);
        }
        ul{
            list-style: none;
        }
    </style>
</head>

<body>
    <header>
        <h1>Submit Your Review</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="catalog.html">Our Book Catalog</a></li>
                <li><a href="index.html#view-review">Show Reviews</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="review-form-container">
            <h2>Submit Your Review</h2>
            <fieldset>
                <legend>Book Information</legend>
                <div class="form-field">
                    <label for="bookTitle">Book Title:</label>
                    <input type="text" id="bookTitle" name="bookTitle" placeholder="Enter the book title" required>
                </div>
                <div class="form-field">
                    <label for="author">Author:</label>
                    <input type="text" id="author" name="author" placeholder="Enter the author's name" required>
                </div>
                <div class="form-field">
                    <label for="rating">Rating:</label>
                    <input type="number" id="rating" name="rating" min="1" max="5" placeholder="Enter your rating"
                        required>
                </div>
            </fieldset>
            <fieldset>
                <legend>Your Review</legend>
                <div class="form-field">
                    <label for="review">Write your review:</label>
                    <textarea name="review" id="review" cols="30" rows="10" placeholder="Type your review here"
                        required></textarea>
                </div>
            </fieldset>
            <div class="form-field">
                <button type="submit">Submit Review</button>
            </div>
        </div>
    </main>
    <hr>
    <footer>
        <p>
            Copyright &copy; Team Innov8
        </p>
    </footer>
</body>

</html>
